<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Alumni Portal for MN Jha DAV Public School" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>MNJ DAV Alumni Portal</title>
    <style>
    #preloader {
      position: fixed; inset: 0; z-index: 9999;
      background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #preloader.hide { opacity: 0; pointer-events: none; transform: scale(1.03); }
    #preloader::before {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.45; pointer-events: none;
    }
    #preloader::after {
      content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%); pointer-events: none;
    }
    .pl-emblem {
      width: 72px; height: 72px; border-radius: 16px; background: #f5a623;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 34px; font-weight: 700; font-style: italic; color: #080808;
      position: relative; z-index: 1; animation: plPulse 2s ease-in-out infinite;
    }
    @keyframes plPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0.5); }
      50%      { box-shadow: 0 0 0 18px rgba(245,166,35,0); }
    }
    .pl-text { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; gap: 5px; }
    .pl-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; color: #f2ede8; letter-spacing: 0.2px; }
    .pl-location { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300; color: rgba(242,237,232,0.4); text-transform: uppercase; letter-spacing: 2px; }
    .pl-bar-wrap { position: relative; z-index: 1; width: 200px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .pl-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f5a623, #ff6b1a); border-radius: 2px; transition: width 0.08s linear; }
    .pl-percent { position: relative; z-index: 1; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300; color: rgba(245,166,35,0.7); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
    </style>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="preloader">
      <div class="pl-emblem">D</div>
      <div class="pl-text">
        <div class="pl-name">MN JHA DAV Public School</div>
        <div class="pl-location">Jhanjharpur, Bihar</div>
      </div>
      <div class="pl-bar-wrap">
        <div class="pl-bar" id="plBar"></div>
      </div>
      <div class="pl-percent" id="plPct">0%</div>
    </div>
    <div id="root"></div>

    <script>
      function startPreloader() {
        const loader = document.getElementById('preloader');
        const bar = document.getElementById('plBar');
        const pct = document.getElementById('plPct');

        loader.classList.remove('hide');
        loader.style.display = 'flex';
        bar.style.width = '0%';
        pct.textContent = '0%';

        let progress = 0;
        
        // Target 99% progressively
        const interval = setInterval(() => {
          const remaining = 100 - progress;
          const increment = Math.random() * (remaining * 0.12) + 0.5;
          progress = Math.min(progress + increment, 99);
          bar.style.width = progress + '%';
          pct.textContent  = Math.floor(progress) + '%';
        }, 80);

        // Minimum time requirement of 3 seconds
        const minTimePromise = new Promise(resolve => setTimeout(resolve, 3000));
        
        // Load event requirement
        const loadPromise = new Promise(resolve => {
           if (document.readyState === 'complete') {
              resolve();
           } else {
              window.addEventListener('load', resolve, { once: true });
           }
        });

        // Fallback max time
        const fallback = setTimeout(() => finishLoad(), 6000);

        // Wait for BOTH the page to load AND 3 seconds to pass
        Promise.all([loadPromise, minTimePromise]).then(() => {
            finishLoad();
        });

        function finishLoad() {
          clearInterval(interval);
          clearTimeout(fallback);
          
          bar.style.transition = 'width 0.3s ease';
          bar.style.width = '100%';
          pct.textContent = '100%';

          setTimeout(() => {
            loader.classList.add('hide');
            setTimeout(() => { loader.style.display = 'none'; }, 700);
          }, 400);
        }
      }
      startPreloader();
    </script>
</body>

</html>
